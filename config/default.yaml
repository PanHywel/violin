# Violin configuration
# Override with a custom YAML via: --config my_config.yaml

# ── Models ──────────────────────────────────────────────────
models:
  transcription:
    provider: volcengine                # "together" | "openai" | "volcengine"
    model: zh-CN                        # together → openai/whisper-large-v3 | openai → whisper-1 | volcengine → language code
  translation:
    provider: deepseek                  # "together" | "openai" | "deepseek"
    model: deepseek-chat                # together → deepseek-ai/DeepSeek-V4-Pro | openai → gpt-5.5 | deepseek → deepseek-chat
  tts:
    provider: volcengine                # "together" | "elevenlabs" | "openai" | "volcengine"
    model: volcano_tts                  # together → cartesia/sonic-3 | elevenlabs → eleven_v3 | openai → tts-1-hd | volcengine → volcano_tts
  chat:
    provider: together                  # "together" | "openai" — must be vision-capable (sees sampled video frames)
    model: Qwen/Qwen3.5-397B-A17B       # together → Qwen/Qwen3.5-397B-A17B | openai → gpt-5.5

# ── Preferences ─────────────────────────────────────────────
# What to use when a request doesn't explicitly pick a style/voice.
preferences:
  style: "standard"      # "standard" | "kids" | "academic" | "casual" | "storyteller" | "news" — see prompts/styles.yaml
  voice_gender: "male"   # "male" | "female" — picks the default native voice

# Below: per-stage tuning knobs in pipeline execution order
# (audio extract → transcription → translation → tts → segment merge → video merge → api → chat)
# These ship tuned for the default stack — typical users don't need to touch
# anything past this line. Override them in a separate YAML loaded with --config.

# ── 1. Transcription ────────────────────────────────────────
transcription:
  chunk_seconds: 600   # split audio into chunks of this length (seconds) for Whisper
  parallel_workers: 2  # number of parallel Whisper API calls for chunked audio

# ── 2. Translation ──────────────────────────────────────────
translation:
  batch_size: 64
  max_retries: 3
  temperature: 0.3
  # ASR correction hints — tell the LLM about known transcription errors so it can fix
  # them during translation. Format: "wrong → correct (context)".
  asr_corrections:
    - "03 → o3 (OpenAI model name, e.g. o3-mini)"
    - "04 → o4 (OpenAI model name, e.g. o4-mini)"
    - "01 → o1 (OpenAI model name)"

# ── 3. TTS ──────────────────────────────────────────────────
tts:
  workers: 8                        # parallel TTS API calls. Segments that get 429-throttled automatically fall back to serial, so this is safe even on entry-tier keys (just slower for those).
  tail_silence_ms: 120              # (ms) silence after segments ending in a comma / mid-clause break (keeps speech flowing)
  sentence_tail_silence_ms: 250     # (ms) silence after a sentence-ending mark (period/!?/。！？) — longer to feel natural

# ── 4. Segment merging (combine Whisper fragments into sentences) ──
merge:
  max_gap: 1.0           # seconds — merge if gap between segments is smaller
  max_duration: 60.0     # seconds — never merge beyond this total length
  max_subtitle_chars: 20 # split sub-sentences longer than this at clause punctuation (、，；,;)

# ── 5. Video merge / alignment ──────────────────────────────
merge_video:
  workers: 16           # concurrent ffmpeg processes per job (each ~300MB RAM); raise this on slower instances via prod.yaml
  output_fps: 30
  min_gap: 0.05        # seconds — skip gap chunks shorter than this
  speed_clamp_min: 0.5
  speed_clamp_max: 2.5
  max_freeze_s: 0.2       # cap on frozen-frame duration when TTS is much longer than the speed-clamped video; beyond this the audio is sped up via atempo instead
  max_audio_speedup: 1.3  # ceiling on atempo applied to TTS to compensate for over-budget speech (1.0 = no speedup, 1.3 ≈ podcast 1.3×)
  crf: 23
  preset: "ultrafast"
  voiceover_volume: 0.1  # 0.0–1.0 — original audio level for CLI voiceover mode

# ── 6. API server ───────────────────────────────────────────
api:
  jobs_dir: "jobs"
  max_workers: 4             # concurrent jobs (× merge_video.workers = total ffmpeg processes); lower on small instances via prod.yaml
  job_ttl_hours: 0           # auto-delete completed/failed jobs older than this hours (0 = disable; set in prod.yaml for public deployments)
  free_trial_jobs: 0         # free jobs per IP before requiring a user-provided API key (0 = BYOK-only)
  url_upload: true           # allow users to paste video URLs (yt-dlp); set false to disable
  max_duration_seconds: 0    # reject videos longer than this in seconds (0 = unlimited); set in prod.yaml
  max_file_size_mb: 0        # reject uploads larger than this in MB (0 = unlimited); set in prod.yaml

# ── 7. Video chat (post-job Q&A over dubbed video) ──────────
chat:
  context_window_seconds: 60
  frame_interval_seconds: 10
  max_frames: 6
  temperature: 0.2
  max_tokens: 512
